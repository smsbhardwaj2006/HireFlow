<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Resume — HireFlow</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <div class="dash-shell" id="dash-shell-root">
    <main class="dash-main">
      <div id="page-content"></div>
    </main>
  </div>

  <script src="js/data.js"></script>
  <script src="js/app.js"></script>
  <script src="js/sidebar.js"></script>
  <script>
    Store.ensureSeeded();
    renderDashboardShell("student", "student-resume.html");

    const student = Auth.currentStudent();

    function renderResumePage() {
      document.getElementById("page-content").innerHTML = `
        <div class="dash-topbar">
          <div><h1>Resume</h1><p class="sub">Companies download this when reviewing your application</p></div>
        </div>

        <div class="profile-section-card" style="max-width:560px;">
          ${student.resumeName ? `
            <div class="resume-file-row">
              <div style="display:flex; align-items:center; gap:12px;">
                <span style="font-size:1.4rem;">📄</span>
                <div>
                  <div style="font-weight:600; font-size:0.9rem;">${student.resumeName}</div>
                  <div style="font-size:0.78rem; color:var(--slate);">Uploaded successfully</div>
                </div>
              </div>
              <div style="display:flex; gap:14px;">
                <button class="btn btn-outline btn-sm" id="replace-btn">Replace</button>
                <button class="btn btn-danger btn-sm" id="remove-btn">Remove</button>
              </div>
            </div>
          ` : `
            <div class="resume-upload-box" id="upload-box">
              <div class="icon">📄</div>
              <p style="font-weight:600; margin-bottom:6px;">Click to upload your resume</p>
              <p style="font-size:0.8rem; color:var(--slate);">PDF only — this is a demo, no real file is stored</p>
            </div>
          `}
          <input type="file" id="resume-input" accept="application/pdf" style="display:none;">
        </div>
      `;

      const uploadBox = document.getElementById("upload-box");
      if (uploadBox) uploadBox.addEventListener("click", () => document.getElementById("resume-input").click());

      const replaceBtn = document.getElementById("replace-btn");
      if (replaceBtn) replaceBtn.addEventListener("click", () => document.getElementById("resume-input").click());

      const removeBtn = document.getElementById("remove-btn");
      if (removeBtn) removeBtn.addEventListener("click", () => {
        student.resumeName = null;
        saveStudent();
        UI.toast("Resume removed", "success");
        renderResumePage();
      });

      document.getElementById("resume-input").addEventListener("change", (e) => {
        const file = e.target.files[0];
        if (!file) return;
        if (file.type !== "application/pdf") {
          UI.toast("Please upload a PDF file", "error");
          return;
        }
        // Demo only: we store the filename, not the actual file (no backend to persist it to)
        student.resumeName = file.name;
        saveStudent();
        UI.toast("Resume uploaded", "success");
        renderResumePage();
      });
    }

    function saveStudent() {
      let score = 20;
      if (student.phone) score += 15;
      if (student.skills.length > 0) score += 20;
      if (student.resumeName) score += 30;
      if (student.cgpa) score += 15;
      student.profileComplete = Math.min(100, score);

      const students = Store.students();
      const idx = students.findIndex(s => s.id === student.id);
      if (idx >= 0) students[idx] = student;
      Store.setStudents(students);
    }

    if (student) renderResumePage();
  </script>
</body>
</html>
