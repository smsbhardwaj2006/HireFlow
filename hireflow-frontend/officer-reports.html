<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reports — HireFlow</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <div class="dash-shell" id="dash-shell-root">
    <main class="dash-main">
      <div id="page-content"></div>
    </main>
  </div>

  <script src="js/data.js"></script>
  <script src="js/app.js"></script>
  <script src="js/sidebar.js"></script>
  <script>
    Store.ensureSeeded();
    renderDashboardShell("officer", "officer-reports.html");

    const students = Store.students();
    const apps = Store.applications();
    const selectedApps = apps.filter(a => a.status === "selected");

    // Department-wise stats
    const deptStats = BRANCHES.map(branch => {
      const branchStudents = students.filter(s => s.branch === branch);
      const branchSelected = selectedApps.filter(a => {
        const student = students.find(s => s.id === a.studentId);
        return student && student.branch === branch;
      });
      return {
        branch,
        total: branchStudents.length,
        placed: branchSelected.length,
        rate: branchStudents.length ? Math.round((branchSelected.length / branchStudents.length) * 100) : 0,
      };
    }).filter(d => d.total > 0);

    const overallRate = students.length ? Math.round((selectedApps.length / students.length) * 100) : 0;
    const avgPackage = selectedApps.length
      ? Math.round(selectedApps.reduce((sum, a) => sum + (Store.jobs().find(j => j.id === a.jobId)?.salary || 0), 0) / selectedApps.length)
      : 0;

    document.getElementById("page-content").innerHTML = `
      <div class="dash-topbar">
        <div><h1>Reports &amp; Analytics</h1><p class="sub">Placement statistics across the current cycle</p></div>
        <button class="btn btn-outline btn-sm" id="export-btn">Export report</button>
      </div>

      <div class="stat-cards">
        <div class="stat-card"><div class="label">Overall Placement Rate</div><div class="value">${overallRate}%</div></div>
        <div class="stat-card"><div class="label">Students Placed</div><div class="value">${selectedApps.length} / ${students.length}</div></div>
        <div class="stat-card"><div class="label">Average Package</div><div class="value">${UI.formatCurrency(avgPackage)}</div></div>
        <div class="stat-card"><div class="label">Active Drives</div><div class="value">${Store.drives().filter(d => d.status === 'open').length}</div></div>
      </div>

      <div class="widget-card">
        <h3>Department-wise placement report</h3>
        <table class="data-table">
          <thead><tr><th>Branch</th><th>Total Students</th><th>Placed</th><th>Placement Rate</th></tr></thead>
          <tbody>
            ${deptStats.map(d => `
              <tr>
                <td><strong>${d.branch}</strong></td>
                <td>${d.total}</td>
                <td>${d.placed}</td>
                <td>
                  <div style="display:flex; align-items:center; gap:10px;">
                    <div class="progress-bar-track" style="width:100px;"><div class="progress-bar-fill" style="width:${d.rate}%;"></div></div>
                    <span style="font-size:0.82rem; font-weight:600;">${d.rate}%</span>
                  </div>
                </td>
              </tr>
            `).join("")}
          </tbody>
        </table>
      </div>

      <div class="widget-card">
        <h3>Company-wise hiring report</h3>
        <table class="data-table">
          <thead><tr><th>Company</th><th>Jobs posted</th><th>Applications received</th><th>Selected</th></tr></thead>
          <tbody>
            ${Store.companies().map(c => {
              const companyJobIds = Store.jobs().filter(j => j.companyId === c.id).map(j => j.id);
              const companyApps = apps.filter(a => companyJobIds.includes(a.jobId));
              const companySelected = companyApps.filter(a => a.status === "selected");
              return `
                <tr>
                  <td>${c.logo} ${c.name}</td>
                  <td>${companyJobIds.length}</td>
                  <td>${companyApps.length}</td>
                  <td>${companySelected.length}</td>
                </tr>
              `;
            }).join("")}
          </tbody>
        </table>
      </div>
    `;

    document.getElementById("export-btn").addEventListener("click", () => {
      UI.toast("Demo mode: would export this report as a PDF/CSV", "success");
    });
  </script>
</body>
</html>
