<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Placement Drives — HireFlow</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <div class="dash-shell" id="dash-shell-root">
    <main class="dash-main">
      <div id="page-content"></div>
    </main>
  </div>

  <div class="modal-overlay" id="drive-modal">
    <div class="modal-box">
      <div class="modal-head"><h3 id="modal-title">Create drive</h3><button class="modal-close" id="modal-close">&times;</button></div>
      <form id="drive-form">
        <input type="hidden" id="d-id">
        <div class="form-field"><label>Drive title</label><input type="text" id="d-title" required></div>
        <div class="form-field"><label>Assign company</label>
          <select id="d-company" required></select>
        </div>
        <div class="form-row">
          <div class="form-field"><label>Application deadline</label><input type="date" id="d-deadline" required></div>
          <div class="form-field"><label>Interview date</label><input type="date" id="d-interview" required></div>
        </div>
        <button type="submit" class="btn btn-accent btn-block">Save drive</button>
      </form>
    </div>
  </div>

  <script src="js/data.js"></script>
  <script src="js/app.js"></script>
  <script src="js/sidebar.js"></script>
  <script>
    Store.ensureSeeded();
    renderDashboardShell("officer", "officer-drives.html");

    const companySelect = document.getElementById("d-company");
    companySelect.innerHTML = Store.companies().filter(c => c.status === "approved").map(c => `<option value="${c.id}">${c.name}</option>`).join("");

    function renderPage() {
      const drives = Store.drives();
      document.getElementById("page-content").innerHTML = `
        <div class="dash-topbar">
          <div><h1>Placement Drives</h1><p class="sub">${drives.length} drive${drives.length === 1 ? "" : "s"} created</p></div>
          <button class="btn btn-accent" id="add-drive-btn">+ Create drive</button>
        </div>

        <table class="data-table">
          <thead><tr><th>Drive</th><th>Company</th><th>Jobs</th><th>Deadline</th><th>Interview Date</th><th>Status</th><th></th></tr></thead>
          <tbody>
            ${drives.map(d => {
              const company = Store.companies().find(c => c.id === d.companyId);
              return `
                <tr>
                  <td><strong>${d.title}</strong></td>
                  <td>${company ? company.name : "—"}</td>
                  <td>${d.jobIds.length}</td>
                  <td>${UI.formatDate(d.deadline)}</td>
                  <td>${UI.formatDate(d.interviewDate)}</td>
                  <td><span class="status-pill ${d.status === 'open' ? 'active' : 'closed'}">${d.status === 'open' ? 'Open' : 'Closed'}</span></td>
                  <td class="table-actions">
                    <button data-edit="${d.id}">Edit</button>
                    <button class="danger" data-delete="${d.id}">Delete</button>
                  </td>
                </tr>
              `;
            }).join("")}
          </tbody>
        </table>
      `;

      document.getElementById("add-drive-btn").addEventListener("click", () => openModal());
      document.querySelectorAll("[data-edit]").forEach(btn => btn.addEventListener("click", () => openModal(btn.dataset.edit)));
      document.querySelectorAll("[data-delete]").forEach(btn => btn.addEventListener("click", () => {
        if (!confirm("Delete this drive?")) return;
        Store.setDrives(Store.drives().filter(d => d.id !== btn.dataset.delete));
        UI.toast("Drive deleted", "success");
        renderPage();
      }));
    }

    function openModal(driveId) {
      const drive = driveId ? Store.drives().find(d => d.id === driveId) : null;
      document.getElementById("modal-title").textContent = drive ? "Edit drive" : "Create drive";
      document.getElementById("d-id").value = driveId || "";
      document.getElementById("d-title").value = drive?.title || "";
      document.getElementById("d-company").value = drive?.companyId || companySelect.options[0]?.value || "";
      document.getElementById("d-deadline").value = drive?.deadline || "";
      document.getElementById("d-interview").value = drive?.interviewDate || "";
      document.getElementById("drive-modal").classList.add("show");
    }

    document.getElementById("modal-close").addEventListener("click", () => document.getElementById("drive-modal").classList.remove("show"));

    document.getElementById("drive-form").addEventListener("submit", (e) => {
      e.preventDefault();
      const id = document.getElementById("d-id").value;
      const data = {
        title: document.getElementById("d-title").value.trim(),
        companyId: document.getElementById("d-company").value,
        deadline: document.getElementById("d-deadline").value,
        interviewDate: document.getElementById("d-interview").value,
      };

      const drives = Store.drives();
      if (id) {
        const idx = drives.findIndex(d => d.id === id);
        drives[idx] = { ...drives[idx], ...data };
      } else {
        drives.push({ id: "d" + Date.now(), ...data, jobIds: [], status: "open" });
      }
      Store.setDrives(drives);

      document.getElementById("drive-modal").classList.remove("show");
      UI.toast(id ? "Drive updated" : "Drive created", "success");
      renderPage();
    });

    renderPage();
  </script>
</body>
</html>
