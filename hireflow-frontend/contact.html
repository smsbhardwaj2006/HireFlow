<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact — HireFlow</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <header class="public-header">
    <div class="container">
      <a href="index.html" class="logo"><span class="mark">H</span> HireFlow</a>
      <nav class="public-nav">
        <a href="index.html">Home</a>
        <a href="about.html">About</a>
        <a href="contact.html">Contact</a>
      </nav>
      <div class="public-nav-actions">
        <a href="login-officer.html" class="btn btn-outline btn-sm">Officer Login</a>
        <a href="register-student.html" class="btn btn-accent btn-sm">Get Started</a>
      </div>
    </div>
  </header>

  <main class="auth-wrapper" style="min-height:60vh;">
    <div class="auth-card" style="max-width:480px;">
      <h2>Get in touch</h2>
      <p class="sub">Questions about HireFlow? Send a message.</p>
      <form id="contact-form" novalidate>
        <div class="form-field">
          <label for="cname">Name</label>
          <input type="text" id="cname" required>
        </div>
        <div class="form-field">
          <label for="cemail">Email</label>
          <input type="email" id="cemail" required>
        </div>
        <div class="form-field">
          <label for="cmessage">Message</label>
          <textarea id="cmessage" rows="4" required></textarea>
        </div>
        <button type="submit" class="btn btn-accent btn-block">Send message</button>
      </form>
    </div>
  </main>

  <footer class="site-footer">
    <div class="container">
      <div class="footer-bottom">
        <span>© 2026 HireFlow. Portfolio project, not a live institution.</span>
        <span>Built with HTML, CSS &amp; JavaScript</span>
      </div>
    </div>
  </footer>

  <script src="js/data.js"></script>
  <script src="js/app.js"></script>
  <script>
    document.getElementById("contact-form").addEventListener("submit", (e) => {
      e.preventDefault();
      UI.toast("Message sent (demo only — no email backend yet)", "success");
      e.target.reset();
    });
  </script>
</body>
</html>
